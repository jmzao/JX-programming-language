<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JX Web IDE v0.1</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --accent: #e94560;
            --success: #4ade80;
            --warning: #fbbf24;
            --error: #ef4444;
            --border: #2d3748;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            grid-template-rows: 60px 1fr 200px;
            height: 100vh;
            gap: 2px;
        }

        /* Header */
        .header {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid var(--accent);
        }

        .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--accent);
        }

        .header-buttons button {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            margin-left: 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .header-buttons button:hover {
            background: var(--accent);
        }

        /* File Explorer */
        .file-explorer {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 10px;
        }

        .file-explorer h3 {
            color: var(--accent);
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .file-item {
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
        }

        .file-item:hover {
            background: var(--bg-tertiary);
        }

        .file-item.active {
            background: var(--accent);
        }

        .file-icon {
            margin-right: 8px;
        }

        /* Editor */
        .editor-container {
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
        }

        .editor-tabs {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border-right: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .tab.active {
            background: var(--bg-primary);
            border-bottom: 2px solid var(--accent);
        }

        #editor {
            flex: 1;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: none;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        /* Documentation Panel */
        .docs-panel {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 15px;
        }

        .docs-panel h3 {
            color: var(--accent);
            margin-bottom: 15px;
        }

        .doc-section {
            margin-bottom: 20px;
        }

        .doc-section h4 {
            color: var(--success);
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .doc-item {
            background: var(--bg-tertiary);
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .doc-code {
            color: var(--warning);
            font-weight: bold;
        }

        /* Console */
        .console-container {
            grid-column: 1 / -1;
            background: #000;
            border-top: 2px solid var(--accent);
            display: flex;
            flex-direction: column;
        }

        .console-header {
            background: var(--bg-secondary);
            padding: 5px 15px;
            font-size: 0.8em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #console {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--success);
        }

        .console-line {
            margin-bottom: 5px;
            white-space: pre-wrap;
        }

        .console-error {
            color: var(--error);
        }

        .console-warning {
            color: var(--warning);
        }

        .console-info {
            color: var(--text-secondary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--accent);
        }

        .modal h3 {
            color: var(--accent);
            margin-bottom: 20px;
        }

        .modal input, .modal textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 4px;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-buttons button {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 60px 200px 1fr 150px;
            }

            .file-explorer, .docs-panel {
                display: none;
            }

            .file-explorer.mobile-show, .docs-panel.mobile-show {
                display: block;
                position: absolute;
                top: 60px;
                left: 0;
                right: 0;
                bottom: 200px;
                z-index: 100;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🚀 JX Web IDE v0.1</div>
            <div class="header-buttons">
                <button onclick="runCode()">▶️ Executar</button>
                <button onclick="newFile()">📄 Novo</button>
                <button onclick="saveFile()">💾 Salvar</button>
                <button onclick="toggleDocs()">📚 Docs</button>
            </div>
        </div>

        <!-- File Explorer -->
        <div class="file-explorer" id="fileExplorer">
            <h3>📁 ARQUIVOS</h3>
            <div id="fileList"></div>
        </div>

        <!-- Editor -->
        <div class="editor-container">
            <div class="editor-tabs" id="editorTabs"></div>
            <textarea id="editor" placeholder="# Escreva seu código JX aqui...
# Use Ctrl+S para salvar
# Use Ctrl+Enter para executar"></textarea>
        </div>

        <!-- Documentation -->
        <div class="docs-panel" id="docsPanel">
            <h3>📚 DOCUMENTAÇÃO JX</h3>
            <div id="docsContent"></div>
        </div>

        <!-- Console -->
        <div class="console-container">
            <div class="console-header">
                <span>🖥️ CONSOLE</span>
                <button onclick="clearConsole()" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;">🗑️ Limpar</button>
            </div>
            <div id="console"></div>
        </div>
    </div>

    <!-- New File Modal -->
    <div class="modal" id="newFileModal">
        <div class="modal-content">
            <h3>Novo Arquivo</h3>
            <input type="text" id="newFileName" placeholder="nome_do_arquivo.jx">
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeModal('newFileModal')">Cancelar</button>
                <button class="btn-primary" onclick="createNewFile()">Criar</button>
            </div>
        </div>
    </div>

    <script>
        // === JX Interpreter ===
        class JXInterpreter {
            constructor() {
                this.variables = {};
                this.consoleHistory = [];
                this.currentLine = 0;
                this.savedStates = {};
            }

            log(message, type = 'info') {
                const consoleEl = document.getElementById('console');
                const line = document.createElement('div');
                line.className = `console-line console-${type}`;
                line.textContent = message;
                consoleEl.appendChild(line);
                consoleEl.scrollTop = consoleEl.scrollHeight;
                this.consoleHistory.push({ message, type });
            }

            clearConsole() {
                document.getElementById('console').innerHTML = '';
                this.consoleHistory = [];
            }

            parseValue(value) {
                value = value.trim();
                
                if (value.toLowerCase() === 'verdadeiro' || value === 'true') return true;
                if (value.toLowerCase() === 'falso' || value === 'false') return false;
                
                if (value.startsWith('"') && value.endsWith('"')) {
                    return value.slice(1, -1);
                }
                if (value.startsWith("'") && value.endsWith("'")) {
                    return value.slice(1, -1);
                }
                
                const num = parseFloat(value);
                if (!isNaN(num)) return num;
                
                if (this.variables[value] !== undefined) {
                    return this.variables[value];
                }
                
                return value;
            }

            evaluateExpression(expr) {
                expr = expr.trim();
                
                // Replace variables with their values
                for (const [key, value] of Object.entries(this.variables)) {
                    const regex = new RegExp(`\\b${key}\\b`, 'g');
                    expr = expr.replace(regex, JSON.stringify(value));
                }
                
                // Safe evaluation
                try {
                    // Only allow basic math operations
                    if (/^[\d\s\+\-\*\/\(\)\.]+$/.test(expr)) {
                        return eval(expr);
                    }
                    return expr;
                } catch (e) {
                    return expr;
                }
            }

            execute(code) {
                this.clearConsole();
                this.log('=== JX Interpreter v0.1 ===', 'info');
                this.log('Iniciando execução...', 'info');
                
                const lines = code.split('\n');
                let i = 0;
                
                while (i < lines.length) {
                    try {
                        this.executeLine(lines[i].trim(), lines, i);
                        i++;
                    } catch (error) {
                        this.log(`Erro na linha ${i + 1}: ${error.message}`, 'error');
                        break;
                    }
                }
                
                this.log('=== Execução finalizada ===', 'info');
            }

            executeLine(line, allLines, currentIndex) {
                if (!line || line.startsWith('#')) return;

                line = line.trim();

                // Console.display()
                if (line.startsWith('Console.display(')) {
                    const match = line.match(/Console\.display\((.*)\)/);
                    if (match) {
                        const value = this.parseValue(match[1]);
                        this.log(value, 'info');
                    }
                    return;
                }

                // Console.back.backspace
                if (line === 'Console.back.backspace') {
                    this.log('[BACKSPACE]', 'warning');
                    return;
                }

                // Console.back.enter
                if (line === 'Console.back.enter') {
                    this.log('[ENTER]', 'warning');
                    return;
                }

                // back.line(linha) - descarta estados
                if (line.startsWith('back.line(')) {
                    const match = line.match(/back\.line\((\d+)\)/);
                    if (match) {
                        const lineNumber = parseInt(match[1]);
                        this.log(`⬅️ Voltando para linha ${lineNumber} (estados descartados)`, 'warning');
                        // In a real implementation, this would jump to that line
                        // For now, we just log the action
                    }
                    return;
                }

                // back.linesave(linha) - salva estados
                if (line.startsWith('back.linesave(')) {
                    const match = line.match(/back\.linesave\((\d+)\)/);
                    if (match) {
                        const lineNumber = parseInt(match[1]);
                        // Save current state
                        this.savedStates[currentIndex] = { ...this.variables };
                        this.log(`💾 Salvando estado e voltando para linha ${lineNumber}`, 'success');
                        // In a real implementation, this would jump to that line
                    }
                    return;
                }

                // Variable declaration
                if (line.includes('=')) {
                    const parts = line.split('=');
                    if (parts.length === 2) {
                        const varName = parts[0].trim();
                        const value = this.parseValue(parts[1].trim());
                        this.variables[varName] = value;
                        return;
                    }
                }

                // Loop structure (simplified)
                if (line.startsWith('Loop')) {
                    this.log('🔁 Loop iniciado', 'info');
                    return;
                }

                if (line === 'stop()') {
                    this.log('⏹️ Loop parado', 'warning');
                    return;
                }

                // Wait commands
                if (line.startsWith('Wait(') || line.startsWith('Wait.frame(')) {
                    this.log('⏳ Aguardando...', 'info');
                    return;
                }

                // Transform commands
                if (line.startsWith('transform.int(')) {
                    const match = line.match(/transform\.int\((.*)\)/);
                    if (match) {
                        const value = this.parseValue(match[1]);
                        this.log(`🔄 Convertido para int: ${parseInt(value)}`, 'info');
                    }
                    return;
                }

                // Replace command
                if (line.startsWith('Replace(') && line.includes(') to ')) {
                    const match = line.match(/Replace\((.*)\) to "(.*)"/);
                    if (match) {
                        const varName = match[1].trim();
                        const newValue = match[2];
                        this.variables[varName] = newValue;
                        this.log(`🔄 ${varName} substituído por "${newValue}"`, 'success');
                    }
                    return;
                }

                // Input detection (simulated)
                if (line.startsWith('input.detect(')) {
                    this.log('⌨️ Detectando entrada...', 'info');
                    return;
                }

                // Unknown command
                if (line && !line.startsWith('#')) {
                    this.log(`❓ Comando não reconhecido: ${line}`, 'warning');
                }
            }
        }

        // === File System (using localStorage) ===
        class FileSystem {
            constructor() {
                this.files = JSON.parse(localStorage.getItem('jx_files') || '{}');
                this.currentFile = null;
                this.openTabs = [];
            }

            save() {
                localStorage.setItem('jx_files', JSON.stringify(this.files));
            }

            createFile(name, content = '') {
                if (this.files[name]) {
                    alert('Arquivo já existe!');
                    return false;
                }
                this.files[name] = { content, created: new Date().toISOString() };
                this.save();
                return true;
            }

            getFile(name) {
                return this.files[name];
            }

            updateFile(name, content) {
                if (this.files[name]) {
                    this.files[name].content = content;
                    this.files[name].modified = new Date().toISOString();
                    this.save();
                    return true;
                }
                return false;
            }

            deleteFile(name) {
                delete this.files[name];
                this.save();
            }

            listFiles() {
                return Object.keys(this.files);
            }

            getExampleFiles() {
                return {
                    'hello_world.jx': `# Olá Mundo em JX
Console.display("Olá, Mundo!")
Console.display("Bem-vindo à JX Web IDE!")

# Variáveis
nome = "Desenvolvedor"
Console.display("Olá, " + nome)`,
                    
                    'render_demo.jx': `# Demonstração de Renderização
Console.display("Linha 1")
Console.display("Linha 2")
Console.display("Linha 3")

# Usando back.line (descarta estados)
back.line(1)
Console.display("Linha 1 atualizada")

# Usando back.linesave (salva estados)
back.linesave(2)
Console.display("Linha 2 com estado salvo")

Console.display("Fim da demonstração")`,
                    
                    'variables_demo.jx': `# Demonstração de Variáveis
# Tipos de dados em JX

# Inteiro
numero = 42
Console.display("Número: ")
Console.display(numero)

# Texto
texto = "Hello JX"
Console.display(texto)

# Booleano
ativo = verdadeiro
Console.display("Ativo: ")
Console.display(ativo)

# Substituição
Replace(numero) to "100"
Console.display("Novo número: ")
Console.display(numero)`
                };
            }
        }

        // === IDE Controller ===
        class IDE {
            constructor() {
                this.fs = new FileSystem();
                this.interpreter = new JXInterpreter();
                this.editor = document.getElementById('editor');
                this.docsShown = true;
                
                this.init();
            }

            init() {
                this.loadExamples();
                this.renderFileList();
                this.renderDocs();
                this.setupEventListeners();
                
                // Open first file
                const files = this.fs.listFiles();
                if (files.length > 0) {
                    this.openFile(files[0]);
                }
            }

            loadExamples() {
                const examples = this.fs.getExampleFiles();
                for (const [name, content] of Object.entries(examples)) {
                    if (!this.fs.getFile(name)) {
                        this.fs.createFile(name, content);
                    }
                }
            }

            renderFileList() {
                const fileList = document.getElementById('fileList');
                fileList.innerHTML = '';
                
                const files = this.fs.listFiles();
                files.forEach(file => {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    if (file === this.fs.currentFile) {
                        item.classList.add('active');
                    }
                    item.innerHTML = `<span class="file-icon">📄</span>${file}`;
                    item.onclick = () => this.openFile(file);
                    fileList.appendChild(item);
                });
            }

            renderDocs() {
                const docsContent = document.getElementById('docsContent');
                docsContent.innerHTML = `
                    <div class="doc-section">
                        <h4>📤 SAÍDA</h4>
                        <div class="doc-item"><span class="doc-code">Console.display()</span> - Mostra no console</div>
                    </div>
                    
                    <div class="doc-section">
                        <h4>⌨️ ENTRADA</h4>
                        <div class="doc-item"><span class="doc-code">Console.input()</span> - Recebe entrada</div>
                        <div class="doc-item"><span class="doc-code">input.detect()</span> - Detecta teclas (w,a,s,d,enter,space,escape)</div>
                    </div>
                    
                    <div class="doc-section">
                        <h4>🔁 LOOP</h4>
                        <div class="doc-item"><span class="doc-code">Loop {}</span> - Estrutura de loop</div>
                        <div class="doc-item"><span class="doc-code">stop()</span> - Para o loop</div>
                        <div class="doc-item"><span class="doc-code">Wait()</span> - Espera tempo</div>
                        <div class="doc-item"><span class="doc-code">Wait.frame()</span> - Espera frames</div>
                    </div>
                    
                    <div class="doc-section">
                        <h4>🗑️ RENDER</h4>
                        <div class="doc-item"><span class="doc-code">Console.back.backspace</span> - Volta um caractere</div>
                        <div class="doc-item"><span class="doc-code">Console.back.enter</span> - Volta uma linha</div>
                        <div class="doc-item"><span class="doc-code">back.line(n)</span> - Volta p/ linha n (descarta estados)</div>
                        <div class="doc-item"><span class="doc-code">back.linesave(n)</span> - Volta p/ linha n (salva estados)</div>
                    </div>
                    
                    <div class="doc-section">
                        <h4>🔄 TRANSFORM</h4>
                        <div class="doc-item"><span class="doc-code">transform.int()</span> - Converte para inteiro</div>
                        <div class="doc-item"><span class="doc-code">Replace(var) to "valor"</span> - Substitui valor</div>
                    </div>
                    
                    <div class="doc-section">
                        <h4>📊 OPERADORES</h4>
                        <div class="doc-item"><span class="doc-code">==</span> igual | <span class="doc-code">#=</span> diferente</div>
                        <div class="doc-item"><span class="doc-code">&lt;</span> menor | <span class="doc-code">&gt;</span> maior</div>
                        <div class="doc-item"><span class="doc-code">+</span> soma | <span class="doc-code">-</span> subtrai</div>
                        <div class="doc-item"><span class="doc-code">*</span> multiplica | <span class="doc-code">/</span> divide</div>
                    </div>
                `;
            }

            openFile(filename) {
                const file = this.fs.getFile(filename);
                if (file) {
                    this.fs.currentFile = filename;
                    this.editor.value = file.content;
                    
                    if (!this.fs.openTabs.includes(filename)) {
                        this.fs.openTabs.push(filename);
                    }
                    
                    this.renderFileList();
                    this.renderTabs();
                }
            }

            renderTabs() {
                const tabsContainer = document.getElementById('editorTabs');
                tabsContainer.innerHTML = '';
                
                this.fs.openTabs.forEach(tab => {
                    const tabEl = document.createElement('div');
                    tabEl.className = 'tab';
                    if (tab === this.fs.currentFile) {
                        tabEl.classList.add('active');
                    }
                    tabEl.textContent = tab;
                    tabEl.onclick = () => this.openFile(tab);
                    tabsContainer.appendChild(tabEl);
                });
            }

            setupEventListeners() {
                // Save on Ctrl+S
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey && e.key === 's') {
                        e.preventDefault();
                        this.saveCurrentFile();
                    }
                    if (e.ctrlKey && e.key === 'Enter') {
                        e.preventDefault();
                        runCode();
                    }
                });

                // Auto-save on edit
                this.editor.addEventListener('input', () => {
                    if (this.fs.currentFile) {
                        this.fs.updateFile(this.fs.currentFile, this.editor.value);
                    }
                });
            }

            saveCurrentFile() {
                if (this.fs.currentFile) {
                    this.fs.updateFile(this.fs.currentFile, this.editor.value);
                    this.interpreter.log('💾 Arquivo salvo!', 'success');
                }
            }

            toggleDocs() {
                const docsPanel = document.getElementById('docsPanel');
                this.docsShown = !this.docsShown;
                docsPanel.style.display = this.docsShown ? 'block' : 'none';
            }
        }

        // === Global Functions ===
        let ide;

        function initIDE() {
            ide = new IDE();
        }

        function runCode() {
            const code = document.getElementById('editor').value;
            ide.interpreter.execute(code);
        }

        function newFile() {
            document.getElementById('newFileModal').style.display = 'flex';
            document.getElementById('newFileName').focus();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function createNewFile() {
            const name = document.getElementById('newFileName').value.trim();
            if (!name) {
                alert('Digite um nome para o arquivo!');
                return;
            }
            if (!name.endsWith('.jx')) {
                alert('O arquivo deve ter extensão .jx');
                return;
            }
            
            if (ide.fs.createFile(name, '# Novo arquivo JX\n')) {
                ide.openFile(name);
                closeModal('newFileModal');
                document.getElementById('newFileName').value = '';
                ide.interpreter.log(`📄 Arquivo ${name} criado!`, 'success');
            }
        }

        function saveFile() {
            ide.saveCurrentFile();
        }

        function toggleDocs() {
            ide.toggleDocs();
        }

        function clearConsole() {
            ide.interpreter.clearConsole();
        }

        // Initialize on load
        window.onload = initIDE;
    </script>
</body>
</html>
